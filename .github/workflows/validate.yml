name: Validate MVP

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    name: Static project validation
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run validation script
        run: ./scripts/validate_project.sh
